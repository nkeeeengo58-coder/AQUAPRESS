name: Daily AQUA PRESS Video Generation

on:
  schedule:
    # UTC 08:00 every day (JST 17:00)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: daily-video-generation
      cancel-in-progress: false

    services:
      # Phase 8: VOICEVOX Docker service for narration synthesis
      voicevox:
        image: voicevox/voicevox_engine:latest-cpu
        options: --cpus 2 --memory 2gb
        ports:
          - 50021:50021
        env:
          CPU_ONLY: 'true'
        # Wait for VOICEVOX to be ready (health check)
        volumes:
          - /tmp/voicevox:/tmp/voicevox

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler and generate video (primary)
        id: primary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash
          GEMINI_API_ENDPOINT: https://generativelanguage.googleapis.com/v1beta/models
          VOICEVOX_ENGINE_URL: http://voicevox:50021
          AQUAPRESS_VOICEVOX: '1'
        run: |
          # Wait for VOICEVOX to be ready
          for i in {1..30}; do
            if curl -s http://voicevox:50021/speakers > /dev/null 2>&1; then
              echo "[INFO] VOICEVOX service is ready"
              break
            fi
            echo "[INFO] Waiting for VOICEVOX... ($i/30)"
            sleep 1
          done

          set +e
          python src/main.py --crawler 2>&1 | tee primary.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            echo "fallback_needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eqi "quota|resource exhausted|rate limit|too many requests|429" primary.log; then
            echo "fallback_needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Primary pipeline failed for non-quota reason."
          exit "$status"

      - name: Fallback local full pipeline
        if: steps.primary.outputs.fallback_needed == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash
          GEMINI_API_ENDPOINT: https://generativelanguage.googleapis.com/v1beta/models
          VOICEVOX_ENGINE_URL: http://voicevox:50021
          AQUAPRESS_VOICEVOX: '1'
        run: |
          python scripts/run_local_full_pipeline.py

      - name: Commit generated outputs
        run: |
          git config user.name "AQUA PRESS Bot"
          git config user.email "bot@aquapress.local"

          [ -d output/metadata ] && git add output/metadata || true
          [ -d output/videos ] && git add output/videos || true
          [ -d output/generated/images ] && git add output/generated/images || true

          if git diff --cached --quiet; then
              echo "[INFO] No generated changes to commit"
              exit 0
          fi

          git commit -m "chore: daily auto video generation $(date -u +%Y-%m-%d)"
          git push
          echo "[OK] Pushed generated outputs"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-video-generation-${{ github.run_id }}
          retention-days: 7
          path: |
            primary.log
            output/metadata/**
            output/videos/**
            output/generated/images/**

      - name: Notify completion
        if: always()
        run: |
          echo "[INFO] Daily AQUA PRESS generation completed"
          echo "Repository: https://github.com/${{ github.repository }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
